server {
  listen 80;
  listen [::]:80;
  server_name __PROTECTEDHOST__;
  root /usr/share/nginx/html;

  # --- Point interne : verification d'authentification via LLNG ---
  location = /lmauth {
    internal;
    include /etc/nginx/fastcgi_params;
    fastcgi_pass __AUTHSERVER__;
    fastcgi_pass_request_body  off;
    fastcgi_param CONTENT_LENGTH "";
    fastcgi_param VHOSTTYPE 'DevOps';
    fastcgi_param HOST $host;
    fastcgi_param X_ORIGINAL_URI $original_uri;
  }

  # --- Toutes les requetes sont protegees ---
  location / {
    index index.html;
    try_files $uri $uri/ =404;

    # Capture de l'URI originale
    set $original_uri $uri$is_args$args;

    # Verification aupres de LLNG
    auth_request /lmauth;

    # Recuperation des headers injectes par LLNG
    auth_request_set $lmremote_user $upstream_http_lm_remote_user;
    auth_request_set $lmremote_custom $upstream_http_lm_remote_custom;
    auth_request_set $lmlocation $upstream_http_location;

    # En cas de 401 -> redirection vers le portail
    error_page 401 $lmlocation;

    # Transmission du user authentifie a l'application
    proxy_set_header Auth-User $lmremote_user;
  }
}

global
    user haproxy
    group haproxy

defaults
    log global
    mode http
    option httplog clf
    option dontlognull
    retries 3
    option redispatch
    maxconn 2000

frontend http-in
    bind *:80

    # Portail d'authentification LLNG (auth.example.com)
    acl is_portal hdr_end(host) -i auth.example.com
    use_backend portal if is_portal

    # Manager LLNG (manager.example.com)
    acl is_manager hdr_end(host) -i manager.example.com
    use_backend portal if is_manager

    # Votre application protegee (myapp.example.com)
    acl is_myapp hdr_end(host) -i myapp.example.com
    use_backend myapp if is_myapp

backend portal
   balance roundrobin
   server node1 portal:80

backend myapp
   balance roundrobin
   server node1 myapp:80

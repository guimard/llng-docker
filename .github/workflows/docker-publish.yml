name: Build and Publish Docker Images

env:
  VERSION: 2.23.0
  PGVERSION: 17
  DEBIANRELEASE: trixie
  DOCKERREVISION: 2

on:
  push:
    branches: [master,stable]
    tags:
      - 'v*'

jobs:

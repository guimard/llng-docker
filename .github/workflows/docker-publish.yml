    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: build_and_test
        run: ./build-all
        env:
          VERSION: ${{ env.VERSION }}-${{ env.DOCKERREVISION }}

